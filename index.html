<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kombo-Knubbel</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif; /* Example font, Tailwind uses sans-serif by default */
        background-color: #0f172a; /* slate-900 as a fallback */
        color: #cbd5e1; /* slate-300 for base text */
      }
      @keyframes blink {
        50% { opacity: 0.5; }
      }
      .blinking-text {
        animation: blink 1.5s linear infinite;
      }
       /* Custom scrollbar for better aesthetics if needed, Tailwind doesn't directly style scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #334155; /* slate-700 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #64748b; /* slate-500 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; /* slate-400 */
      }
      .dice.held {
        /* Additional visual cue for held dice if border/ring is not enough */
        /* Example: box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.7); /* blue-500 with opacity */
      }
      .clickable {
        transition: background-color 0.2s ease-in-out;
      }

      @keyframes dice-roll-animation {
        0% { transform: rotate(0deg) scale(1) translateY(0px); }
        20% { transform: rotate(20deg) scale(1.15) translateY(-10px) translateX(2px); }
        40% { transform: rotate(-15deg) scale(1.15) translateY(-7px) translateX(-2px); }
        60% { transform: rotate(10deg) scale(1.15) translateY(-3px); }
        80% { transform: rotate(-10deg) scale(1.15) translateY(0px); }
        100% { transform: rotate(0deg) scale(1) translateY(0px); }
      }

      .dice-is-rolling {
        animation: dice-roll-animation 0.5s ease-in-out infinite;
        filter: blur(1px);
      }

      /* Start Screen Animations */
      @keyframes fadeInScaleUp {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .animate-fadeInScaleUp {
        animation: fadeInScaleUp 0.8s ease-out forwards;
      }

      @keyframes floatDice {
        0%, 100% {
          transform: translateY(0) rotate(-5deg);
        }
        50% {
          transform: translateY(-12px) rotate(5deg);
        }
      }
      .animate-floatDice {
        animation: floatDice 3.5s ease-in-out infinite;
      }
      .animate-floatDice-delay1 {
        animation: floatDice 3.5s ease-in-out 0.3s infinite;
      }
      .animate-floatDice-delay2 {
        animation: floatDice 3.5s ease-in-out 0.6s infinite;
      }

      /* Optional: A more playful font for the start screen if Inter feels too plain */
      .font-game-title {
        /* Example: Use a specific game-like font if available, or a more rounded sans-serif */
        /* font-family: 'Luckiest Guy', cursive; */ /* Requires Google Font import */
         font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
      }

      /* Nebel-Effekt Animationen */
      @keyframes fogMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .foggy-overlay-bg {
        background: linear-gradient(
          135deg, 
          rgba(15, 23, 42, 0.97) 25%, 
          rgba(30, 27, 75, 0.98) 50%, 
          rgba(17, 24, 39, 0.97) 75%
        );
        background-size: 400% 400%;
        animation: fogMove 8s ease infinite;
      }

      /* Glow & Pulse Effects */
      @keyframes shieldPulse {
        0%, 100% { box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        50% { box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); }
      }
      .shield-pulse {
        animation: shieldPulse 2s infinite;
      }

      @keyframes wheelSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(1440deg); }
      }
      .animate-wheel-spin {
        animation: wheelSpin 2.5s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
      }

      @keyframes powerupGlow {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.05); filter: brightness(1.2); }
      }
      .powerup-btn-glow {
        animation: powerupGlow 1.5s ease-in-out infinite;
      }

      @keyframes textShimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer-text {
        background: linear-gradient(90deg, #f59e0b, #fef08a, #f59e0b);
        background-size: 200% auto;
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        animation: textShimmer 3s linear infinite;
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.3.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
